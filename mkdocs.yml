site_name: FactorForge
site_description: Open-source constraint-based CDS design engine for plant CDS design workflows (N. benthamiana, Tobacco BY-2 experimental)
site_url: https://eijex.github.io/factorforge-cds/
repo_url: https://github.com/eijex/factorforge-cds
repo_name: eijex/factorforge-cds

theme:
  name: material
  palette:
    - scheme: default
      primary: teal
      accent: green
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: teal
      accent: green
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.highlight
    - content.code.copy

nav:
  - Home: index.md
  - Getting Started:
    - Installation: getting-started.md
  - Tutorials:
    - GFP Optimization: tutorials/gfp-nbenthamiana.md
  - User Guide:
    - How It Works: how-it-works.md
    - Optimization Profiles: profiles.md
    - CLI Reference: cli.md
    - Output Format: output.md
  - Validation: validation.md
  - Changelog: changelog.md

markdown_extensions:
  - admonition
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - attr_list
