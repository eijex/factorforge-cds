registry:
  name: factorforge_current_parameter_registry
  version: "3.2.6"
  status: canonical
  owner: factorforge-cds
  last_reviewed: "2026-06-10"
  review_context:
    - "Benchmark foundation — registry schema, parameter_audit, production sync contract"
    - "Registry-production constant export (DEFAULT_CAI_TARGET, DEFAULT_GC_LOW/HIGH, BpiI canonical label)"
    - "Design Package + Open Bio I/O contracts (MFE null invariant, FASTA/IUPAC privacy)"
  note: "Registry is not the evidence source. It is a reviewed parameter state derived from evidence packages, benchmarks, and maintainer decisions."

parameters:
  constraints:
    biological:
      aa_identity_target:
        value: 1.0
        unit: fraction
        claim_level: hard_requirement
        evidence_status: hard_gate
        release_status: stable
        source: "src/factorforge/utils/sequence_validator.py"
        rationale: "Optimized CDS must translate to the input protein exactly."
        provenance: "Output validator; molecular biology hard requirement for any CDS optimization."
        visibility: public
        permission: publish_allowed
      internal_stop_allowance:
        value: 0
        unit: count
        claim_level: hard_requirement
        evidence_status: hard_gate
        release_status: stable
        source: "src/factorforge/utils/sequence_validator.py"
        rationale: "Internal stop codons truncate the product."
        provenance: "Output validator; any premature stop codon terminates translation."
        visibility: public
        permission: publish_allowed
      invalid_codons:
        value: 0
        unit: count
        claim_level: hard_requirement
        evidence_status: hard_gate
        release_status: stable
        source: "src/factorforge/utils/sequence_validator.py"
        rationale: "Non-ACGT or non-triplet codons are invalid output."
        provenance: "Output validator; undefined codons cannot be translated."
        visibility: public
        permission: publish_allowed
      length_multiple_of_three:
        value: true
        unit: bool
        claim_level: hard_requirement
        evidence_status: hard_gate
        release_status: stable
        source: "src/factorforge/utils/sequence_validator.py"
        rationale: "CDS length must be a multiple of 3."
        provenance: "Output validator; reading frame integrity hard requirement."
        visibility: public
        permission: publish_allowed
    assembly:
      type_iis_enzymes:
        value: ["BsaI", "BpiI", "BsmBI"]
        unit: list
        claim_level: hard_requirement
        evidence_status: hard_gate
        release_status: stable
        source: "src/factorforge/engines/profile/rules/domesticator.py"
        rationale: "Type IIS sites interfere with Golden Gate / MoClo assembly. BpiI is the canonical FactorForge label for the GAAGAC Type IIS scanning target (see ASSEMBLY_STANDARDS in domesticator.py); BbsI is a common synonym/vendor naming convention for the same recognition target and may appear in external literature."
        provenance: "NEB Golden Gate Assembly protocol standard enzyme list. Canonical label aligned to existing FactorForge production convention (BpiI) — naming normalization, not a change to the biological scanning target."
        visibility: public
        permission: publish_allowed
  optimization:
    cai_target:
      value: 0.82
      unit: unitless
      claim_level: optimization_target
      evidence_status: literature_supported_internal_benchmark
      release_status: stable
      source: "CAI unification + golden_set; src/factorforge/analysis/feasibility.py"
      rationale: "Soft optimization target. Not a hard gate or wet-lab predictor."
      notes: "Production default is exported as DEFAULT_CAI_TARGET and verified by test_registry_production_sync.py."
      provenance: "CAI reference unification; golden_set N. benthamiana CDS distribution (internal benchmark)."
      visibility: public
      permission: publish_allowed
    gc_range_nbenthamiana_global:
      value: [40.0, 47.0]
      unit: percent
      claim_level: optimization_target
      evidence_status: internal_benchmark
      release_status: stable
      source: "src/factorforge/engines/profile/scoring.py; native N. benthamiana genome composition anchor (n=10 native CDS, _analysis/004; cross-validated against nbev11_cds_hc/_all and qld183_v103 derived asset GC, _analysis/025)"
      rationale: "Native genome-composition anchor, not an empirically validated expression optimum. Replaces the prior 55-65% band, which was calibrated from the legacy engine's own GC-rich output rather than from genome biology (documented-but-circular regime, _analysis/025)."
      provenance: "Job 168 / v3.3.0 (_analysis/025): GC-target re-derivation. Prior value (55.0-65.0, n=49 avg GC=60.1% internal benchmark) retained as the explicit non-native high-GC option in feasibility.py's gc_ranges list; not deleted, demoted."
      visibility: public
      permission: publish_allowed
    gc_extreme_local_window:
      value:
        min_gc_percent: 25.0
        max_gc_percent: 75.0
        window_bp: 50
      unit: percent / bp
      claim_level: warning_threshold
      evidence_status: production_default
      release_status: stable
      source: "src/factorforge/engines/profile/scoring.py"
      rationale: "Local GC extremes in 50bp windows indicate potential assembly/expression risk."
      provenance: "Release-readiness audit; heuristic derived from assembly folding risk literature."
      visibility: public
      permission: publish_allowed
  scoring:
    mfe:
      status_policy:
        value:
          if_computed: "include_metric"
          if_unavailable: "report_not_computed"
          if_failed: "report_error_or_warning"
        claim_level: warning_threshold
        evidence_status: production_default
        release_status: stable
        source: "MFE is optional; null/status/used contract prevents 0.0 placeholder."
        rationale: "MFE not computed must not be reported as 0.0 — semantically misleading."
        provenance: "Pipeline validation hardening; MFE null contract fix."
        visibility: public
        permission: publish_allowed
  benchmarks:
    sgn_cds_count:
      value: 3876
      unit: sequences
      claim_level: documentation_only
      evidence_status: internal_benchmark
      release_status: stable
      source: "Sol Genomics Network N. benthamiana CDS (filtered)"
      rationale: "Reference dataset size for benchmark reproducibility."
      provenance: "Internal benchmark; Sol Genomics Network public CDS download, filtered for valid ORFs."
      visibility: public
      permission: publish_allowed
  host_profiles:
    nbenthamiana:
      display_name: "N. benthamiana"
      scientific_name: "Nicotiana benthamiana"
      ncbi_taxonomy_id: 4100
      ncbi_taxonomy_curie: "NCBITaxon:4100"
      status: stable
      claim_level: documentation_only
      evidence_status: production_default
      release_status: stable
      source: "NCBI Taxonomy Browser NCBITaxon:4100; Sol Genomics Network"
      rationale: "Primary host for N. benthamiana plant expression; default host profile."
      provenance: "Baseline host profile; NCBI taxid confirmed during host-addition review."
      visibility: public
      permission: publish_allowed
    by2:
      display_name: "BY-2 / N. tabacum"
      scientific_name: "Nicotiana tabacum"
      ncbi_taxonomy_id: 4097
      status: experimental
      claim_level: experimental_setting
      evidence_status: experimental
      release_status: experimental
      source: "NCBI Taxonomy Browser NCBITaxon:4097; Nagata et al. (1992)"
      rationale: "Tobacco BY-2 experimental host; not validated for production use."
      provenance: "BY-2 host addition; experimental only — Nagata et al. (1992) BY-2 cell line."
      visibility: public
      permission: publish_allowed

