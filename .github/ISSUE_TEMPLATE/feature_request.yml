name: Feature Request
description: Suggest a new feature or improvement
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      placeholder: "e.g. I need to optimize for Wolffia globosa but there is no support yet."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Codon optimization engine
        - New host organism
        - CLI
        - Web app
        - Docker
        - Documentation
        - Other
    validations:
      required: true
