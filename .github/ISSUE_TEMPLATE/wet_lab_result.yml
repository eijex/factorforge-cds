name: Public-safe Wet-lab Summary
description: Share a non-confidential experimental outcome summary for maintainer review
labels: ["wet-lab", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for sharing experimental feedback.

        GitHub Issues are public. Submit only a coarse, non-confidential summary.
        Do not include raw sequences, construct IDs, protein or target identities,
        unpublished construct details, internal batch IDs, patient data, private
        contact information, institution names, exact process parameters, or
        confidential partner/customer information.

        Submissions are user-provided feedback summaries, not controlled validation
        studies or guarantees of FactorForge performance.

  - type: input
    id: version
    attributes:
      label: FactorForge version
      placeholder: "e.g. 3.2.3"
    validations:
      required: true

  - type: dropdown
    id: profile
    attributes:
      label: Public profile used
      options:
        - balanced
        - high_cai
        - gc_target
        - assembly_friendly
        - Not reported
    validations:
      required: true

  - type: dropdown
    id: host
    attributes:
      label: Host context
      options:
        - N. benthamiana agroinfiltration
        - Tobacco BY-2 experimental
        - Other public-safe host category
        - Not reported
    validations:
      required: true

  - type: dropdown
    id: protein_class
    attributes:
      label: Coarse protein class
      options:
        - Antibody / VHH
        - Enzyme
        - Membrane protein
        - Fluorescent / Reporter protein
        - Antigen
        - Cytokine
        - Other non-identifying class
        - Not reported
    validations:
      required: true

  - type: dropdown
    id: assay_category
    attributes:
      label: Coarse assay category
      options:
        - Western blot
        - ELISA
        - Functional assay
        - Other non-identifying assay category
        - Not reported
    validations:
      required: true

  - type: dropdown
    id: comparison_result
    attributes:
      label: Comparison with control
      options:
        - Improved
        - Equivalent
        - Reduced
        - Inconclusive
        - No control
        - Not reported
    validations:
      required: true

  - type: dropdown
    id: expression_result
    attributes:
      label: Coarse observed outcome
      options:
        - Detected
        - Not detected
        - Weak
        - Strong
        - Inconclusive
        - Not reported
    validations:
      required: true

  - type: dropdown
    id: replicate_category
    attributes:
      label: Replicate category
      options:
        - Single experiment
        - 2-3 replicates
        - 4+ replicates
        - Not reported

  - type: dropdown
    id: approximate_yield_range
    attributes:
      label: Coarse yield range
      description: Select only if this range is non-confidential.
      options:
        - Low
        - Medium
        - High
        - Not measured
        - Not reported

  - type: textarea
    id: non_confidential_notes
    attributes:
      label: Non-confidential notes
      description: Do not include sequence, construct, target, institution, or exact process details.
      placeholder: "Optional coarse context only."

  - type: checkboxes
    id: public_safe_confirmation
    attributes:
      label: Public-safe confirmation
      options:
        - label: I confirm that this public issue contains no raw sequence, construct ID, target identity, unpublished construct detail, internal batch ID, patient data, private contact information, institution name, exact process parameter, or confidential partner/customer information.
          required: true
        - label: I understand that this submission does not constitute a validation certificate or clinical endorsement of FactorForge outputs.
          required: true
        - label: I understand that maintainers may edit, summarize, or decline this submission before referencing it in public documentation.
          required: true
