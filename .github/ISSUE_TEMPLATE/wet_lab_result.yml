name: Wet-lab Result
description: Share experimental validation results — credited in VALIDATION.md
labels: ["wet-lab-result"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for testing FactorForge in the lab!
        Results (positive or negative) will be credited in [VALIDATION.md](https://github.com/eijex/factorforge-cds/blob/main/VALIDATION.md).

  - type: input
    id: version
    attributes:
      label: FactorForge version
      placeholder: "e.g. 3.1.0 (pip show factorforge-cds)"
    validations:
      required: true

  - type: input
    id: construct_id
    attributes:
      label: Construct ID
      description: Found in the optimization result (construct_id field)
      placeholder: "e.g. a3f7b2c1"

  - type: input
    id: profile
    attributes:
      label: Optimization profile used
      placeholder: "e.g. balanced, high_cai, gc_target, viral_delivery"

  - type: input
    id: protein
    attributes:
      label: Protein
      placeholder: "e.g. GFP, CD47, CD9, custom antigen"
    validations:
      required: true

  - type: input
    id: host
    attributes:
      label: Host organism
      placeholder: "e.g. Nicotiana benthamiana"
    validations:
      required: true

  - type: input
    id: system
    attributes:
      label: Expression system / assay
      placeholder: "e.g. Agrobacterium infiltration, Western blot, ELISA"
    validations:
      required: true

  - type: input
    id: promoter
    attributes:
      label: Promoter (optional)
      placeholder: "e.g. 35S, AtUBQ10, custom"

  - type: dropdown
    id: subcellular_targeting
    attributes:
      label: Subcellular targeting (optional)
      options:
        - Cytosol
        - ER
        - Apoplast
        - Membrane
        - Other

  - type: input
    id: harvest_timepoint
    attributes:
      label: Harvest timepoint (optional)
      placeholder: "e.g. 4 dpi, 6 dpi"

  - type: dropdown
    id: native_control
    attributes:
      label: Native / unoptimized sequence used as control?
      options:
        - "Yes"
        - "No"
        - Not tested

  - type: dropdown
    id: result
    attributes:
      label: Expression result
      options:
        - Expressed (confirmed)
        - Expressed (improved vs native)
        - No expression
        - Partial / inconclusive
    validations:
      required: true

  - type: textarea
    id: details
    attributes:
      label: Details
      description: Quantitative data, comparison with native sequence, conditions, notes
      placeholder: "e.g. Western band at expected MW, yield ~5 mg/L, compared with unoptimized sequence..."

  - type: input
    id: institution
    attributes:
      label: Institution (optional)
      placeholder: "e.g. University of X"
