name: Public-safe Wet-lab Feedback Summary
description: Share a non-confidential experimental feedback summary for maintainer review
title: "[Wet-lab feedback]: "
labels: ["wet-lab", "user-feedback", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for sharing experimental feedback.

        GitHub Issues are public. Submit only a coarse, non-confidential summary.
        Do not include raw sequences, construct IDs, protein or target identities,
        unpublished construct details, internal batch IDs, patient data, private
        contact information, institution names, exact process parameters, or
        confidential partner/customer information.

        Submissions are user-provided feedback summaries only. They are not
        controlled validation studies, regulatory claims, clinical endorsements,
        or guarantees of FactorForge performance.

  - type: input
    id: version
    attributes:
      label: FactorForge version
      placeholder: "e.g. 3.2.6"
    validations:
      required: true

  - type: dropdown
    id: profile
    attributes:
      label: Public profile used
      options:
        - balanced
        - high_cai
        - gc_target
        - assembly_friendly
        - Not reported
    validations:
      required: true

  - type: dropdown
    id: host
    attributes:
      label: Host context
      options:
        - N. benthamiana agroinfiltration
        - Tobacco BY-2 experimental
        - Other public-safe host category
        - Not reported
    validations:
      required: true

  - type: dropdown
    id: protein_class
    attributes:
      label: Coarse protein class
      options:
        - Antibody / VHH
        - Enzyme
        - Membrane protein
        - Fluorescent / Reporter protein
        - Antigen
        - Cytokine
        - Other non-identifying class
        - Not reported
    validations:
      required: true

  - type: dropdown
    id: assay_category
    attributes:
      label: Coarse assay category
      description: Select only a broad category. Do not include target identity, exact protocol, raw values, antibody details, process parameters, or confidential information.
      options:
        - Protein detection assay
        - Immunoassay
        - Reporter or activity assay
        - Other non-identifying assay category
        - Not reported
    validations:
      required: true

  - type: dropdown
    id: comparison_result
    attributes:
      label: Coarse comparison with available control
      description: Use only a coarse public-safe comparison. Do not include exact yields, raw measurements, construct IDs, target identities, or confidential details.
      options:
        - Improved
        - Equivalent
        - Reduced
        - Inconclusive
        - No control
        - Not reported
    validations:
      required: true

  - type: dropdown
    id: expression_result
    attributes:
      label: Coarse public-safe observation
      description: Use a coarse summary only. This field does not establish controlled validation, clinical relevance, or guaranteed FactorForge performance.
      options:
        - Signal observed
        - No signal observed
        - Inconclusive
        - Not measured
        - Not reported
    validations:
      required: true

  - type: dropdown
    id: replicate_category
    attributes:
      label: Replicate category
      options:
        - Single experiment
        - 2-3 replicates
        - 4+ replicates
        - Not reported


  - type: textarea
    id: non_confidential_notes
    attributes:
      label: Non-confidential notes
      description: Do not include sequence, construct, target, institution, or exact process details.
      placeholder: "Optional coarse context only."

  - type: checkboxes
    id: public_safe_confirmation
    attributes:
      label: Public-safe confirmation
      options:
        - label: I confirm that this public issue contains no raw sequence, construct ID, target identity, unpublished construct detail, internal batch ID, patient data, private contact information, institution name, exact process parameter, or confidential partner/customer information.
          required: true
        - label: I understand that this submission is user-provided feedback only and is not a controlled validation study, regulatory claim, clinical endorsement, or guarantee of FactorForge performance.
          required: true
        - label: I understand that maintainers may edit, summarize, or decline this submission before referencing it in public documentation.
          required: true
