{% set name = "factorforge-cds" %}
{% set version = "3.3.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.io/packages/source/{{ name[0] }}/{{ name }}/{{ name.replace('-', '_') }}-{{ version }}.tar.gz
  sha256: ee5451ae463d37d1201600f56583f2c23c750977c94dd990baf8954e92a6967c

build:
  number: 0
  noarch: python
  script: {{ PYTHON }} -m pip install . --no-deps --ignore-installed -vv
  run_exports:
    - {{ pin_subpackage('factorforge-cds', max_pin="x") }}

requirements:
  host:
    - python >=3.10
    - pip
    - setuptools >=68
    - wheel
  run:
    - python >=3.10
    - biopython >=1.81
    - requests >=2.31
    - click >=8.0
    - pydantic >=2.0

test:
  imports:
    - factorforge
    - factorforge.engines
    - factorforge.validation
  commands:
    - factorforge --help
    - factorforge-validate --help

about:
  home: https://factorforge.eijex.com
  dev_url: https://github.com/eijex/factorforge-cds
  doc_url: https://eijex.github.io/factorforge-cds/
  license: AGPL-3.0-only
  license_family: AGPL
  license_file: LICENSE
  summary: Constraint-aware coding sequence design engine for plant CDS design workflows
  description: |
    FactorForge is an open-source CDS design engine for plant CDS design workflows,
    with an initial focus on Nicotiana benthamiana. It provides deterministic,
    constraint-aware synonymous CDS design via a dynamic-programming feasibility
    engine, profile-based rule checks, and MoClo/Golden Gate-oriented output.
    Distributed as a Python package, CLI, REST API, and Docker-deployable web app.

extra:
  recipe-maintainers:
    - eijex
