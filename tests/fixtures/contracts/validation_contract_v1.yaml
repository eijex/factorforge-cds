  - check_id: dinucleotides
    display_name: "CpG / TpA dinucleotide density"
    primary_domain: advisory_scan
    implementation_path: "src/factorforge/engines/profile/rules/rule_engine.py"
    implementation_symbol: "scan_dinucleotides()"
    default_enabled: true
    threshold: "see implementation"
    threshold_source: "engineering_heuristic"
    enforcement_bare_optimizer: "advisory_only"
    enforcement_pipeline_default: "advisory_only"
    enforcement_benchmark_scoring: "not_included"
