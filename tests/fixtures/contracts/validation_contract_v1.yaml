    claim_boundary: "Advisory finding, not a validated translation-rate measurement."
    known_limitations: []

  # -------------------------------------------------------------------------
  # Domain D — Assembly Review
  # -------------------------------------------------------------------------
  - check_id: restriction_sites
    display_name: "Type IIS restriction sites (BsaI/BpiI/BsmBI)"
    primary_domain: assembly_review
    implementation_path: "src/factorforge/engines/profile/rules/domesticator.py; src/factorforge/utils/restriction_sites.py"
    implementation_symbol: "Domesticator.domesticate / detect_restriction_sites"
    default_enabled: true
    threshold: "built-in sites: BsaI(GGTCTC), BpiI(GAAGAC), BsmBI(CGTCTC), scan_rc=True; custom sites supported via domesticate_custom_sites"
    threshold_source: "assembly_standard_definition (Golden Gate / MoClo)"
    enforcement_bare_optimizer: "not_checked"
    enforcement_pipeline_default: "hard_fail_raise (ValueError if unfixable)"
    enforcement_benchmark_scoring: "component_of_assembly_pass (soft, no raise)"
    ui_badge_status: "customRestrictionResults panel (separate from valPolyA/valMoClo/valGC badges)"
    in_violations_total: false
    output_field: "metadata.domestication (pipeline); forbidden_type_iis_site_count, assembly_pass (benchmark)"
    test_status: "covered"
    scientific_interpretation: "Internal Type IIS sites would be cleaved during Golden Gate / MoClo assembly."
    claim_boundary: "Same biological check enforced at TWO different strengths: production pipeline raises and halts; benchmark scoring records a soft boolean. Manuscript Methods must specify which path is being described."
    known_limitations: []

  - check_id: moclo_overhang
    display_name: "MoClo Level-0 overhang validity + internal collision"
    primary_domain: assembly_review
    implementation_path: "src/factorforge/engines/profile/construct_builder.py"
    implementation_symbol: "validate_overhangs, check_internal_overhang_collisions, generate_construct"
    default_enabled: false
    threshold: "5' AATG / 3' GCTT (MoClo Level 0 CDS standard)"
    threshold_source: "assembly_standard_definition (MoClo)"
    enforcement_bare_optimizer: "not_checked"
    enforcement_pipeline_default: "opt-in only (construct_template param defaults to None); when run, warnings are logged but never raised"
    enforcement_benchmark_scoring: "not_included"
    ui_badge_status: "valMoClo badge, default value 'UNCHECKED'"
    in_violations_total: false
    output_field: "construct generation warnings (logger only); not part of any structured pass/fail field"
    test_status: "covered (construct_builder tests) for the validation logic itself; not exercised by default product paths"
    scientific_interpretation: "Internal MoClo overhang occurrences could disrupt Golden Gate assembly if a construct is built."
    claim_boundary: "MUST be described as a non-gating, opt-in advisory check. It is not run by default, and even when run it never blocks a result — unlike restriction_sites, which can halt the pipeline."
    known_limitations: ["Not gating anywhere in the codebase as of pinned commit.", "Not run by default (requires explicit construct_template)."]

# ---------------------------------------------------------------------------
# Quantitative metrics — non-gating, reported only (separate from `checks`)
# ---------------------------------------------------------------------------
metrics:
  - metric_id: cai
    display_name: "Codon Adaptation Index"
    output_field: "metrics.cai (optimizer/pipeline); cai (benchmark)"
    gating: false
    claim_boundary: "Optimization target metric, not part of multi_constraint_pass or any production verdict."
  - metric_id: gc_percent
    display_name: "Global GC%"
    output_field: "metrics.gc_content / gc_percent (kept as two keys for caller compatibility)"
    gating: false
  - metric_id: violations_total
    display_name: "Advisory finding count (unweighted)"
    output_field: "metrics.violations = sum(len(v) for v in scan_results.values())"
    gating: false
    claim_boundary: "Unweighted sum across the 9 advisory scanners ONLY. Does not include integrity checks, configured constraints, or assembly-review findings. Findings may overlap spatially/mechanistically. This is NOT a biological quality score."
  - metric_id: score
    display_name: "Composite score"
    output_field: "metrics.score"
    gating: false
  - metric_id: mfe
    display_name: "Minimum free energy (provenance-gated)"
    output_field: "compute_mfe_evidence() output"
    gating: false
    claim_boundary: "Reports whether MFE was actually computed to avoid an uncomputed value being misread as 0.0 (per prior 016 audit)."
  - metric_id: runtime_seconds
    display_name: "Runtime"
    output_field: "benchmark only"
    gating: false

# ---------------------------------------------------------------------------
# Explicitly excluded from this contract (documented, not silently dropped)
# ---------------------------------------------------------------------------
excluded_from_scope:
  - id: legacy_validate_candidate_sequence
    reason: "utils/validation.py::validate_candidate_sequence and its analysis/metrics.py-based detectors (detect_homopolymers, detect_repeats, detect_invalid_codons, detect_forbidden_motifs in that call path) have no active caller in the current product surface as of the pinned commit. All callers found are under archive/v3-ml-prototype/, plus the function's own unit test."
  - id: protein_risk_module
    reason: "Schema field exists (design_package.py::protein_risk) but annotate_protein_risk() has no caller outside its own module and its own test file. Treated as optional/future annotation, outside the core validation harness, per the brainstorm design decision."
