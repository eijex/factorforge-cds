    claim_boundary: "Must not be conflated with global_gc_range in manuscript text — different window, different threshold, different purpose."
    known_limitations: []

  - check_id: splice_sites
    display_name: "Cryptic splice-site-like motifs"
    primary_domain: advisory_scan
    implementation_path: "src/factorforge/engines/profile/rules/rule_engine.py"
    implementation_symbol: "scan_splice_sites()"
    default_enabled: true
    threshold: "donor GT[AG]AG ... 20-200bp ... acceptor [CT]AG (plant consensus GTRAG...YAG)"
