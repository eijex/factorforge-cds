    enforcement_pipeline_default: "advisory_only"
    enforcement_benchmark_scoring: "not_included"
    ui_badge_status: "not_badged (valGC badge is the unrelated global_gc_range check)"
    in_violations_total: true
    output_field: "metadata.scan_results.gc_extremes"
