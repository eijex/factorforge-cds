    enforcement_bare_optimizer: "advisory_only"
    enforcement_pipeline_default: "advisory_only"
    enforcement_benchmark_scoring: "not_included"
    ui_badge_status: "not_badged"
    in_violations_total: true
    output_field: "metadata.scan_results.splice_sites"
